<!DOCTYPE html>
<html>
<head>
    <title>Notes System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📚 Notes Sharing</h2>
        <div>
            <a href="/upload" class="btn btn-primary">⬆ Upload</a>
            <a href="/dashboard" class="btn btn-dark">📊 Dashboard</a>
        </div>
    </div>

    <!-- SEARCH -->
    <form action="/search" method="GET" class="mb-4 d-flex">
        <input type="text" name="q" class="form-control me-2" placeholder="Search notes...">
        <button class="btn btn-success">Search</button>
        <a href="/" class="btn btn-secondary ms-2">Reset</a>
    </form>

    <!-- NOTES -->
    <div class="row">
        {% for note in notes %}
        <div class="col-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title">{{ note.title }}</h5>
                    <p class="card-text text-muted">📘 {{ note.subject }}</p>

                    <a href="/download/{{ note.filename }}" class="btn btn-success btn-sm">
                        ⬇ Download
                    </a>
                    <a href="/delete/{{ note._id }}" class="btn btn-danger btn-sm">
                        ❌ Delete
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
